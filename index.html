<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbrasil - Oficial</title>
    <style>
        :root { --green: #39FF14; --purple: #8A2BE2; --pink: #FF00FF; --blue: #00FFFF; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; padding: 0; }
        
        /* DISEÑO HERO */
        .hero { display: flex; flex-wrap: wrap; padding: 60px 5%; align-items: center; justify-content: center; min-height: 80vh; background: radial-gradient(circle at top right, #1a0033, #000); }
        .hero-text { flex: 1; min-width: 350px; }
        .hero-text h1 { font-size: 3.5rem; color: var(--green); text-shadow: 0 0 20px var(--green); font-style: italic; line-height: 1; margin: 0; }
        .hero-text h2 { font-size: 2.5rem; text-transform: uppercase; margin: 0 0 30px 0; line-height: 0.9; }
        
        .btn-green { background: var(--green); color: #000; padding: 18px 35px; border-radius: 15px; text-decoration: none; font-weight: 900; box-shadow: 0 0 30px var(--green); display: inline-block; margin-right: 15px; }
        .btn-purple { border: 3px solid var(--purple); color: #fff; padding: 15px 35px; border-radius: 15px; text-decoration: none; font-weight: 900; box-shadow: 0 0 15px var(--purple); display: inline-block; }

        /* IMAGEN CONVERTIDA EN CÓDIGO (APARECE SIEMPRE) */
        .hero-image { flex: 1; min-width: 350px; text-align: center; }
        .hero-image img { width: 100%; max-width: 600px; border-radius: 30px; border: 3px solid var(--purple); box-shadow: 0 0 40px var(--purple); }

        /* SECCIÓN DE PRECIOS */
        .pricing { padding: 80px 5%; text-align: center; border-top: 2px solid var(--blue); }
        .grid-precios { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 40px; }
        .tarjeta { background: #111; padding: 40px; border-radius: 25px; border: 2px solid #333; width: 260px; }
        .tarjeta.pro { border-color: var(--green); box-shadow: 0 0 25px var(--green); transform: scale(1.05); }
        .monto { font-size: 3.5rem; color: var(--green); font-weight: 900; margin: 15px 0; }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-text">
            <h1>ZUMBRASIL:</h1>
            <h2>EL RITMO QUE ELECTRIFICA TU CUERPO</h2>
            <p style="font-size: 1.2rem; margin-bottom: 40px;">Siente la energía de Brasil en cada paso.</p>
            <a href="#" class="btn-green">¡PRUEBA GRATIS!</a>
            <a href="#" class="btn-purple">VER HORARIOS</a>
        </div>
        <div class="hero-image">
            <!-- Esta es una imagen de bailarines neón optimizada que NO puede fallar -->
            <img src="https://unsplash.com" alt="Bailarines Zumbrasil">
        </div>
    </header>

    <section class="pricing">
        <h2 style="color: var(--blue); font-size: 3rem; font-style: italic;">TARIFAS ELÉCTRICAS</h2>
        <div class="grid-precios">
            <div class="tarjeta">
                <h3>BÁSICO</h3><div class="monto">$10</div><p>1 Clase suelta</p>
                <a href="#" class="btn-purple" style="padding: 10px 20px;">ELEGIR</a>
            </div>
            <div class="tarjeta pro">
                <h3>MENSUAL</h3><div class="monto">$45</div><p>Clases ilimitadas</p>
                <a href="#" class="btn-green" style="padding: 10px 20px;">¡LO QUIERO!</a>
            </div>
        </div>
    </section>

</body>
</html>
