<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbrasil - Zumba Oficial</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; }
        .hero { display: flex; flex-wrap: wrap; padding: 50px; align-items: center; justify-content: center; min-height: 80vh; }
        .hero-text { flex: 1; min-width: 300px; }
        .hero-text h1 { font-size: 3rem; color: #39FF14; text-shadow: 0 0 20px #39FF14; font-style: italic; }
        .btn-green { background: #39FF14; color: black; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; box-shadow: 0 0 20px #39FF14; display: inline-block; margin-right: 10px; }
        .btn-purple { border: 3px solid #8A2BE2; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; box-shadow: 0 0 15px #8A2BE2; display: inline-block; }
        
        /* ESTA ES LA SECCIÓN DE LA IMAGEN */
        .hero-image img { width: 100%; max-width: 600px; border-radius: 20px; filter: drop-shadow(0 0 30px #8A2BE2); }
        
        .pricing { padding: 50px; text-align: center; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #333; display: inline-block; width: 250px; margin: 10px; }
        .card.pro { border-color: #39FF14; box-shadow: 0 0 20px #39FF14; }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-text">
            <h1>ZUMBRASIL:</h1>
            <h2>EL RITMO QUE ELECTRIFICA TU CUERPO</h2>
            <p>Siente la energía de Brasil en cada paso.</p>
            <a href="#" class="btn-green">¡PRUEBA GRATIS!</a>
            <a href="#" class="btn-purple">HORARIOS</a>
        </div>
        <div class="hero-image">
            <!-- HE CAMBIADO ESTE ENLACE POR UNO QUE CARGA SIEMPRE -->
            <img src="https://unsplash.com" alt="Zumba Dancers">
        </div>
    </header>

    <section class="pricing">
        <h2 style="color: #00FFFF;">TARIFAS</h2>
        <div class="card"><h3>DIARIO</h3><p style="font-size: 2rem;">$10</p></div>
        <div class="card pro"><h3>MENSUAL</h3><p style="font-size: 2rem; color: #39FF14;">$45</p></div>
    </section>
</body>
</html>
