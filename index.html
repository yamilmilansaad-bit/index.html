<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbrasil - El Ritmo que Electrifica</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-green: #39FF14; --neon-pink: #FF00FF; --neon-purple: #8A2BE2; --neon-blue: #00FFFF; }
        body { background-color: #000; color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        /* DISEÑO HERO */
        .hero { display: flex; flex-wrap: wrap; padding: 50px 5%; align-items: center; justify-content: center; min-height: 80vh; background: radial-gradient(circle at top right, #1a0033, #000); }
        .hero-text { flex: 1; min-width: 350px; }
        .hero-text h1 { font-size: 3.5rem; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green); font-style: italic; line-height: 1; }
        .hero-text h2 { font-size: 2.5rem; text-transform: uppercase; margin-top: -10px; }
        
        .btn-green { background: var(--neon-green); color: #000; padding: 18px 30px; border-radius: 15px; text-decoration: none; font-weight: 900; box-shadow: 0 0 30px var(--neon-green); display: inline-block; margin: 10px; }
        .btn-purple { border: 3px solid var(--neon-purple); color: #fff; padding: 15px 30px; border-radius: 15px; text-decoration: none; font-weight: 900; box-shadow: 0 0 15px var(--neon-purple); display: inline-block; margin: 10px; }

        .hero-image img { width: 100%; max-width: 600px; border-radius: 25px; filter: drop-shadow(0 0 40px var(--neon-purple)); }

        /* CARACTERÍSTICAS */
        .features { display: flex; justify-content: space-around; gap: 20px; padding: 50px 5%; flex-wrap: wrap; }
        .card { padding: 30px; border-radius: 20px; background: #0a0a0a; border-left: 5px solid; width: 280px; }
        .card.pink { border-color: var(--neon-pink); }
        .card.green { border-color: var(--neon-green); }
        .card.blue { border-color: var(--neon-blue); }

        /* SECCIÓN DE PRECIOS */
        .pricing { padding: 80px 5%; text-align: center; border-top: 2px solid var(--neon-purple); }
        .price-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 40px; }
        .price-card { background: #111; padding: 40px; border-radius: 25px; border: 2px solid #333; width: 260px; }
        .price-card.featured { border-color: var(--neon-green); box-shadow: 0 0 25px var(--neon-green); transform: scale(1.05); }
        .price-card h3 { font-size: 2rem; margin: 0; }
        .cost { font-size: 3.5rem; color: var(--neon-green); font-weight: 900; margin: 20px 0; }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-text">
            <h1>ZUMBRASIL:</h1>
            <h2>EL RITMO QUE ELECTRIFICA TU CUERPO</h2>
            <p>Siente la energía de Brasil en cada paso.</p>
            <a href="#" class="btn-green">¡PRUEBA GRATIS!</a>
            <a href="#" class="btn-purple">VER HORARIOS</a>
        </div>
        <div class="hero-image">
            <img src="https://unsplash.com" alt="Bailarines">
        </div>
    </header>

    <section class="features">
        <div class="card pink"><h3>RITMOS ELÉCTRICOS</h3></div>
        <div class="card green"><h3>QUEMA CALORÍAS</h3></div>
        <div class="card blue"><h3>FIESTA TOTAL</h3></div>
    </section>

    <section class="pricing">
        <h2 style="color: var(--neon-blue); font-size: 3rem;">TARIFAS</h2>
        <div class="price-grid">
            <div class="price-card">
                <h3>BÁSICO</h3>
                <div class="cost">$10</div>
                <p>1 Clase suelta</p>
                <a href="#" class="btn-purple">ELEGIR</a>
            </div>
            <div class="price-card featured">
                <h3>MENSUAL</h3>
                <div class="cost">$45</div>
                <p>Acceso ilimitado</p>
                <a href="#" class="btn-green">COMPRAR</a>
            </div>
        </div>
    </section>
</body>
</html>
