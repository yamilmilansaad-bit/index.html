<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zumbrasil Zumba</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            align-items: center;
        }
        .nav-links a {
            color: #39FF14;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .hero {
            display: flex;
            padding: 50px;
            align-items: center;
            justify-content: space-around;
        }
        .hero-text h1 {
            font-size: 3.5rem;
            color: #39FF14;
            text-shadow: 0 0 20px #39FF14;
            margin-bottom: 10px;
        }
        .hero-text h2 {
            font-size: 2.5rem;
            margin-top: 0;
            text-transform: uppercase;
        }
        .btn-green {
            background: #39FF14;
            color: #000;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 20px #39FF14;
            display: inline-block;
            margin-right: 20px;
        }
        .btn-purple {
            border: 3px solid #8A2BE2;
            color: #fff;
            padding: 15px 30px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 15px #8A2BE2;
            display: inline-block;
        }
        .features {
            display: flex;
            justify-content: space-around;
            padding: 50px;
        }
        .card {
            border: 2px solid;
            padding: 20px;
            border-radius: 15px;
            width: 25%;
            text-align: center;
        }
        .card.pink { border-color: #FF00FF; box-shadow: inset 0 0 10px #FF00FF; }
        .card.green { border-color: #39FF14; box-shadow: inset 0 0 10px #39FF14; }
        .card.blue { border-color: #00FFFF; box-shadow: inset 0 0 10px #00FFFF; }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 2rem; color: #39FF14; font-style: italic;">Zumbrasil</div>
        <nav class="nav-links">
            <a href="#">Inicio</a> <a href="#">Clases</a> <a href="#">Horarios</a>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-text">
            <h1>ZUMBRASIL:</h1>
            <h2>EL RITMO QUE ELECTRIFICA TU CUERPO</h2>
            <p>Siente la energía de Brasil en cada paso.</p>
            <a href="#" class="btn-green">¡PRUEBA GRATIS!</a>
            <a href="#" class="btn-purple">VER HORARIOS</a>
        </div>
        <img src="https://unsplash.com" style="border-radius: 20px; box-shadow: 0 0 30px #8A2BE2;">
    </section>
    <section class="features">
        <div class="card pink"><h3>RITMOS ELÉCTRICOS</h3></div>
        <div class="card green"><h3>QUEMA CALORÍAS</h3></div>
        <div class="card blue"><h3>FIESTA TOTAL</h3></div>
    </section>
</body>
</html>
